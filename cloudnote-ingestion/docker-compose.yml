version: '3.8'

services:
  # 1. 24/7 Persistent FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cloudnote-backend
    restart: unless-stopped

    ports:
      - "127.0.0.1:8000:8000"

    volumes:
      - ./logs:/app/logs

    env_file:
      - .env

    environment:
      - DB_PATH=/app/logs/cloudnote.db
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. 24/7 Persistent React Frontend Client
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cloudnote-frontend
    restart: unless-stopped

    ports:
      - "127.0.0.1:3000:80"

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 3. On-Demand Playwright Ingestion Worker
  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudnote-ingestion-worker

    init: true

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots

    environment:
      - DB_PATH=/app/logs/cloudnote.db
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Redis Cache & Heartbeat Layer
  redis:
    image: redis:7-alpine
    container_name: cloudnote-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 5. Prometheus Observability Server
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cloudnote-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 6. Grafana Dashboards Viz
  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: cloudnote-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"