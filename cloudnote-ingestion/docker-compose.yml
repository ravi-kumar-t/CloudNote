version: '3.8'

services:
  ingestion-worker:
    build: .
    container_name: cloudnote-ingestion-worker
    init: true
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

