version: '3.8'

services:
  # 1. 24/7 Persistent FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cloudnote-backend
    restart: unless-stopped

    ports:
      - "127.0.0.1:8000:8000"

    volumes:
      - ./logs:/app/logs

    env_file:
      - .env

    environment:
      - DB_PATH=/app/logs/cloudnote.db
      - PYTHONUNBUFFERED=1

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. 24/7 Persistent React Frontend Client
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cloudnote-frontend
    restart: unless-stopped

    ports:
      - "127.0.0.1:3000:80"

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # 3. On-Demand Playwright Ingestion Worker
  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudnote-ingestion-worker

    init: true

    env_file:
      - .env

    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots

    environment:
      - DB_PATH=/app/logs/cloudnote.db
      - PYTHONUNBUFFERED=1

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"